name: PrivateDimension
version: '${project.version}'
main: dev.kiyo.privatedimension.PrivateDimensionPlugin
# Spigot互換のため 1.21 を指定（Paper 26.1.2 は 1.21 系として認識する）
api-version: '1.21'
description: 残留ポーションで専用次元に移動するプラグイン
authors: [29kiyo]

commands:
  pd:
    description: PrivateDimension管理コマンド
    usage: /pd <give|reload|info>
    permission: privatedimension.admin
  privatedim:
    description: PrivateDimension管理コマンド(alias)
    usage: /privatedim <give|reload|info>
    permission: privatedimension.admin

permissions:
  privatedimension.admin:
    description: PrivateDimension管理者権限
    default: op
  privatedimension.use:
    description: PrivateDimensionアイテム使用権限
    default: true
  privatedimension.debug:
    description: プロット境界無視(デバッグ)
    default: op
